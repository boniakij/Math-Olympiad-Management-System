services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: ${FRONTEND_IMAGE:-math-olympiad/frontend:local}
    working_dir: /app
    command: ["sh", "/usr/local/bin/frontend-start"]
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_APP_NAME: ${VITE_APP_NAME:-Math Olympiad Management System}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ${BACKEND_IMAGE:-math-olympiad/backend:local}
    working_dir: /var/www/html
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_NAME: ${APP_NAME:-MathOlympiadApi}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-math_olympiad}
      DB_USERNAME: ${DB_USERNAME:-app_user}
      DB_PASSWORD: ${DB_PASSWORD:-app_password}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:5173,127.0.0.1:5173}
      APP_RUN_MIGRATIONS: ${APP_RUN_MIGRATIONS:-true}
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-math_olympiad}
      MYSQL_USER: ${DB_USERNAME:-app_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-app_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  frontend_node_modules:
  backend_vendor:
  backend_storage:
  mysql_data:
